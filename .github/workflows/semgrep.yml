name: Semgrep SAST (Reusable)

on:
  workflow_call:

jobs:
  # ── Job 1: Semgrep SAST ─────────────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install semgrep and reviewdog
        run: |
          pip install semgrep --quiet
          curl -sfL https://raw.githubusercontent.com/reviewdog/reviewdog/master/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Build rule flags
        id: rules
        shell: bash
        run: |
          # Always-on: foundational cross-language packs
          RULES="p/security-audit p/secrets p/owasp-top-ten p/trailofbits"

          # Always-on: all language packs
          # Semgrep skips rules that don't match the file language — no FP cost
          RULES="$RULES p/python p/golang p/gosec p/java"
          RULES="$RULES p/javascript p/typescript p/rust p/php"
          RULES="$RULES p/ruby p/scala p/kotlin"

          # Infrastructure (detected)
          find . -name "*.tf"         -maxdepth 4 | grep -q . && RULES="$RULES p/terraform"
          find . -name "Dockerfile"   -maxdepth 4 | grep -q . && RULES="$RULES p/dockerfile"
          find . \( -name "*.yaml" -o -name "*.yml" \) -maxdepth 4 \
            | xargs grep -l "^kind:" 2>/dev/null | grep -q .  && RULES="$RULES p/kubernetes"

          # Deduplicate and build flags
          RULES=$(echo "$RULES" | tr ' ' '\n' | sort -u | grep -v '^$' | tr '\n' ' ')
          FLAGS=""
          for r in $RULES; do FLAGS="$FLAGS --config $r"; done
          echo "Rules: $RULES"
          echo "flags=$FLAGS" >> "$GITHUB_OUTPUT"

      - name: Run Semgrep
        shell: bash
        run: |
          semgrep ${{ steps.rules.outputs.flags }} \
            --json --quiet 2>/dev/null > /tmp/semgrep-results.json || true
          echo "Semgrep findings: $(jq '.results | length' /tmp/semgrep-results.json)"

      - name: Post Semgrep inline comments
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          jq -r '.results[] |
            "\(.path):\(.start.line):\(.start.col): warning: [\(.check_id)] \(.extra.message)"' \
            /tmp/semgrep-results.json \
          | reviewdog \
              -efm="%f:%l:%c: %t%*[^:]: %m" \
              -name="Security Scan" \
              -reporter=github-pr-review \
              -filter-mode=added \
              -level=warning \
              -fail-on-error=false

      - name: Semgrep job summary
        if: always()
        shell: bash
        run: |
          COUNT=$(jq '.results | length' /tmp/semgrep-results.json 2>/dev/null || echo 0)
          echo "## Semgrep SAST — $COUNT findings" >> "$GITHUB_STEP_SUMMARY"
          if [ "$COUNT" -gt "0" ]; then
            echo "| File | Line | Rule | Severity |" >> "$GITHUB_STEP_SUMMARY"
            echo "|------|------|------|----------|" >> "$GITHUB_STEP_SUMMARY"
            jq -r '.results[] |
              "| \(.path) | \(.start.line) | \(.check_id) | \(.extra.severity) |"' \
              /tmp/semgrep-results.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No findings." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── Job 2: TruffleHog Secret Scanning ───────────────────────────────────────
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so TruffleHog can scan all commits in the PR

      - name: Install TruffleHog and reviewdog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin
          curl -sfL https://raw.githubusercontent.com/reviewdog/reviewdog/master/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Run TruffleHog
        id: trufflehog
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Scan only commits introduced by this PR
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            echo "Scanning commits $BASE..$HEAD"
            trufflehog git file://. \
              --since-commit "$BASE" \
              --branch "${{ github.head_ref }}" \
              --json \
              --no-update \
              2>/dev/null > /tmp/trufflehog-results.json || true
          else
            # On push to main — scan last commit only
            trufflehog git file://. \
              --since-commit HEAD~1 \
              --json \
              --no-update \
              2>/dev/null > /tmp/trufflehog-results.json || true
          fi

          COUNT=0
          if [ -f /tmp/trufflehog-results.json ]; then
            COUNT=$(grep -c '"DetectorName"' /tmp/trufflehog-results.json 2>/dev/null || true)
            COUNT="${COUNT:-0}"
            COUNT="${COUNT//[[:space:]]/}"
          fi
          echo "TruffleHog verified secrets found: $COUNT"
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

      - name: Post TruffleHog inline PR comments
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # TruffleHog outputs one JSON object per line (NDJSON)
          # Convert to reviewdog errfmt and post as inline comments
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            file=$(echo "$line" | jq -r '.SourceMetadata.Data.Git.file // ""')
            lineno=$(echo "$line" | jq -r '.SourceMetadata.Data.Git.line // 1')
            detector=$(echo "$line" | jq -r '.DetectorName // "Secret"')
            verified=$(echo "$line" | jq -r '.Verified // false')
            raw=$(echo "$line" | jq -r '.Raw // ""' | cut -c1-20)
            [ -z "$file" ] && continue
            echo "${file}:${lineno}:1: error: [TruffleHog:${detector}] Verified live secret detected (${detector}). Rotate immediately. Starts with: ${raw}..."
          done < /tmp/trufflehog-results.json \
          | reviewdog \
              -efm="%f:%l:%c: %t%*[^:]: %m" \
              -name="Secret Scan" \
              -reporter=github-pr-review \
              -filter-mode=file \
              -level=error \
              -fail-on-error=false

      - name: TruffleHog job summary
        if: always()
        shell: bash
        run: |
          COUNT=$(grep -c '"DetectorName"' /tmp/trufflehog-results.json 2>/dev/null || echo 0)
          echo "## TruffleHog Secret Scan — $COUNT verified secrets" >> "$GITHUB_STEP_SUMMARY"
          if [ "$COUNT" -gt "0" ]; then
            echo "| File | Line | Secret Type | Starts With |" >> "$GITHUB_STEP_SUMMARY"
            echo "|------|------|-------------|-------------|" >> "$GITHUB_STEP_SUMMARY"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              file=$(echo "$line" | jq -r '.SourceMetadata.Data.Git.file // "unknown"')
              lineno=$(echo "$line" | jq -r '.SourceMetadata.Data.Git.line // "-"')
              detector=$(echo "$line" | jq -r '.DetectorName // "Secret"')
              raw=$(echo "$line" | jq -r '.Raw // ""' | cut -c1-12)
              echo "| \`$file\` | $lineno | $detector | \`${raw}...\` |"
            done < /tmp/trufflehog-results.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No verified secrets found." >> "$GITHUB_STEP_SUMMARY"
          fi
