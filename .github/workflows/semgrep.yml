name: Semgrep SAST (Reusable)

on:
  workflow_call:

jobs:
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install semgrep and reviewdog
        run: |
          pip install semgrep --quiet
          curl -sfL https://raw.githubusercontent.com/reviewdog/reviewdog/master/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Build rule flags
        id: rules
        shell: bash
        run: |
          # --- Always-on: cross-language foundational packs ---
          RULES=""
          RULES="$RULES p/security-audit"       # general security patterns
          RULES="$RULES p/secrets"              # hardcoded credentials
          RULES="$RULES p/owasp-top-ten"        # OWASP Top 10
          RULES="$RULES p/trailofbits"          # Trail of Bits: crypto, concurrency, CORS

          # --- Always-on: all language packs ---
          # Semgrep skips rules that don't apply to a file's language,
          # so running all packs has no false-positive cost.
          RULES="$RULES p/python"               # Flask/Django taint, pickle, yaml.load
          RULES="$RULES p/golang"               # Go security patterns
          RULES="$RULES p/gosec"                # gosec ruleset for Go
          RULES="$RULES p/java"                 # Java/Spring taint, XXE, SSRF
          RULES="$RULES p/javascript"           # JS/Node XSS, injection, path traversal
          RULES="$RULES p/typescript"           # TypeScript-specific patterns
          RULES="$RULES p/rust"                 # Rust unsafe, crypto
          RULES="$RULES p/php"                  # PHP injection, eval, unserialize, LFI
          RULES="$RULES p/ruby"                 # Ruby/Rails injection, mass assignment
          RULES="$RULES p/scala"                # Scala injection patterns
          RULES="$RULES p/kotlin"               # Kotlin security patterns

          # --- Infrastructure packs (detected) ---
          if find . -name "*.tf" -maxdepth 4 | grep -q .; then
            RULES="$RULES p/terraform"
          fi
          if find . \( -name "*.yaml" -o -name "*.yml" \) -maxdepth 4 \
               | xargs grep -l "^kind:" 2>/dev/null | grep -q .; then
            RULES="$RULES p/kubernetes"
          fi
          if find . -name "Dockerfile" -maxdepth 4 | grep -q .; then
            RULES="$RULES p/dockerfile"
          fi

          # Deduplicate rule names, then build --config flags
          RULES=$(echo "$RULES" | tr ' ' '\n' | sort -u | grep -v '^$' | tr '\n' ' ')
          FLAGS=""
          for r in $RULES; do FLAGS="$FLAGS --config $r"; done

          echo "Rules: $RULES"
          echo "flags=$FLAGS" >> "$GITHUB_OUTPUT"

      - name: Run Semgrep
        shell: bash
        run: |
          semgrep ${{ steps.rules.outputs.flags }} \
            --json \
            --quiet \
            2>/dev/null > /tmp/semgrep-results.json || true
          COUNT=$(jq '.results | length' /tmp/semgrep-results.json)
          echo "Found $COUNT issues"

      - name: Post inline PR comments via reviewdog
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          jq -r '.results[] | "\(.path):\(.start.line):\(.start.col): warning: [\(.check_id)] \(.extra.message)"' \
            /tmp/semgrep-results.json \
          | reviewdog \
              -efm="%f:%l:%c: %t%*[^:]: %m" \
              -name="Security Scan" \
              -reporter=github-pr-review \
              -filter-mode=added \
              -level=warning \
              -fail-on-error=false

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          echo "## Semgrep SAST Results" >> "$GITHUB_STEP_SUMMARY"
          COUNT=$(jq '.results | length' /tmp/semgrep-results.json 2>/dev/null || echo 0)
          echo "**Total findings: $COUNT**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$COUNT" -gt "0" ]; then
            echo "| File | Line | Rule | Severity |" >> "$GITHUB_STEP_SUMMARY"
            echo "|------|------|------|----------|" >> "$GITHUB_STEP_SUMMARY"
            jq -r '.results[] | "| \(.path) | \(.start.line) | \(.check_id) | \(.extra.severity) |"' \
              /tmp/semgrep-results.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No findings. Clean scan." >> "$GITHUB_STEP_SUMMARY"
          fi
